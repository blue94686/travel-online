server {
    listen 80;
    server_name localhost;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    root /usr/share/nginx/html;

    # Missing Vite JS chunks usually mean the browser is still running an old
    # cached entry script after a deployment. Return a tiny module that reloads
    # the page once so the client fetches the newest index.html and asset map.
    location ~* ^/assets/.*\.js$ {
        expires off;
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri /chunk-reload.js;
    }

    location = /chunk-reload.js {
        expires off;
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    # Static assets: cache forever, return 404 if not found (do NOT fallback to index.html)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Static images/public files
    location /images/ {
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing fallback
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Prevent caching of the index.html so clients always get the newest asset hashes
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
